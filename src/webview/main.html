<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src {{{cspSource}}} data:; script-src 'nonce-{{{nonce}}}'; style-src 'nonce-{{{nonce}}}'; connect-src {{{cspSource}}};">
    <title>Chart Visualization</title>
    <link rel="stylesheet" href="{{{stylesUri}}}" nonce="{{{nonce}}}">
</head>
<body data-init="{{{initData}}}" data-view-mode="{{{viewMode}}}">
    <div class="toolbar">
        <button id="exportYaml" class="toolbar-btn">📄 Export YAML</button>
        <button id="exportJson" class="toolbar-btn">📋 Export JSON</button>
        <input type="search" id="searchBox" placeholder="Search resources..." class="search-box">
    </div>

    <div class="tabs">
        <!-- Visualize view tabs -->
        <button class="tab-btn visualize-tab active" data-tab="overview">📈 Overview</button>
        <button class="tab-btn visualize-tab" data-tab="resources">📋 Resources</button>
        <button class="tab-btn visualize-tab" data-tab="rendered">📄 Rendered YAML</button>
        <!-- Compare view tabs -->
        <button class="tab-btn compare-tab" data-tab="compare">⚖️ Compare Environments</button>
    </div>

    <!-- Visualize view content -->
    <div id="overview" class="tab-content visualize-content active">
        {{{overviewContent}}}
    </div>

    <div id="resources" class="tab-content visualize-content">
        {{{resourcesContent}}}
    </div>

    <div id="rendered" class="tab-content visualize-content">
        <div class="rendered-yaml-container">
            <div class="rendered-selector">
                <label for="rendered-env-select">Environment:</label>
                <select id="rendered-env-select" class="env-select">
                    <option value="">Select environment...</option>
                </select>
                <button id="render-yaml-btn" class="toolbar-btn">Render</button>
                <button id="export-rendered-yaml-btn" class="toolbar-btn" disabled>📥 Export YAML</button>
            </div>
            <div id="rendered-yaml-content" class="rendered-yaml-content">
                <div class="no-data">
                    <div class="no-data-icon">📄</div>
                    <div class="no-data-text">Select an environment to view rendered YAML</div>
                    <div class="no-data-hint">Choose an environment from the dropdown above</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Compare view content -->
    <div id="compare" class="tab-content compare-content">
        {{{resultsContent}}}
    </div>

    <script src="{{{chartJsUri}}}" nonce="{{{nonce}}}"></script>
    <script src="{{{topologyJsUri}}}" nonce="{{{nonce}}}"></script>
    <script src="{{{mainJsUri}}}" nonce="{{{nonce}}}"></script>
    <script nonce="{{{nonce}}}">
        // Initialize webview with data
        var initDataStr = document.body.getAttribute('data-init').replace(/"/g, '"');
        if (initDataStr) {
            window.initializeWebview(JSON.parse(initDataStr));
        }

        // Check view mode - 'visualize' or 'compare'
        var viewMode = document.body.getAttribute('data-view-mode') || 'visualize';

        if (viewMode === 'compare') {
            // Show only Compare tab using CSS classes
            document.querySelectorAll('.visualize-tab').forEach(function(tab) {
                tab.classList.add('hidden');
            });
            document.querySelectorAll('.visualize-content').forEach(function(content) {
                content.classList.add('hidden');
            });
            document.querySelectorAll('.compare-tab').forEach(function(tab) {
                tab.classList.remove('hidden');
            });
            document.querySelectorAll('.compare-content').forEach(function(content) {
                content.classList.remove('hidden');
            });
            // Activate Compare tab
            var compareTab = document.querySelector('.compare-tab');
            if (compareTab) {
                compareTab.classList.add('active');
            }
            var compareContent = document.getElementById('compare');
            if (compareContent) {
                compareContent.classList.add('active');
            }
        }

        // Listen for messages from the extension
        window.addEventListener('message', function(event) {
            var message = event.data;
            if (message && message.type === 'renderedYaml') {
                if (window.handleRenderedYamlResponse) {
                    window.handleRenderedYamlResponse(message);
                }
            }
        });
    </script>
</body>
</html>
