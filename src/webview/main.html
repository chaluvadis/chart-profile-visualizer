<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src {{{cspSource}}} data:; script-src 'nonce-{{{nonce}}}'; style-src 'nonce-{{{nonce}}}'; connect-src {{{cspSource}}};">
    <title>Chart Visualization</title>
    <link rel="stylesheet" href="{{{stylesUri}}}" nonce="{{{nonce}}}">
</head>
<body data-init="{{{initData}}}">
    <div class="toolbar">
        <button id="exportYaml" class="toolbar-btn">📄 Export YAML</button>
        <button id="exportJson" class="toolbar-btn">📋 Export JSON</button>
        <input type="search" id="searchBox" placeholder="Search resources..." class="search-box">
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="overview">📈 Overview</button>
        <button class="tab-btn" data-tab="resources">📋 Resources</button>
        <button class="tab-btn" data-tab="compare">⚖️ Compare Environments</button>
    </div>

    <div id="overview" class="tab-content active">
        {{{overviewContent}}}
    </div>

    <div id="resources" class="tab-content">
        {{{resourcesContent}}}
    </div>

    <div id="compare" class="tab-content">
        {{{resultsContent}}}
    </div>

    <script src="{{{chartJsUri}}}" nonce="{{{nonce}}}"></script>
    <script src="{{{topologyJsUri}}}" nonce="{{{nonce}}}"></script>
    <script src="{{{mainJsUri}}}" nonce="{{{nonce}}}"></script>
    <script nonce="{{{nonce}}}">
        // Initialize webview with data
        // The init data is stored in a data attribute to avoid template syntax issues
        // Note: quotes are escaped as &quot; in the HTML attribute, so we need to unescape them
        var initDataStr = document.body.getAttribute('data-init').replace(/&quot;/g, '"');
        if (initDataStr) {
            window.initializeWebview(JSON.parse(initDataStr));
        }
    </script>
</body>
</html>
