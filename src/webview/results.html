<div id="results-content" class="results-content">
    <div id="comparison-selector" class="comparison-selector">
        <div class="selector-form">
            <div class="form-row">
                <select id="env1-select" class="env-select">
                    <option value="">Select base environment</option>
                    {{#each availableEnvs}}
                    <option value="{{this}}">{{this}}</option>
                    {{/each}}
                </select>
                <span class="vs">vs</span>
                <select id="env2-select" class="env-select">
                    <option value="">Select compare environment</option>
                    {{#each availableEnvs}}
                    <option value="{{this}}">{{this}}</option>
                    {{/each}}
                </select>
            </div>
            <button id="run-comparison" class="run-comparison-btn" disabled>Compare</button>
        </div>
    </div>
    <div id="comparison-results" class="comparison-results hidden">
        <!-- Comparison results will be rendered here -->
    </div>
</div>
