<div id="results-content" class="results-content">
    <div id="comparison-selector" class="comparison-selector">
        <div class="selector-header">
            <div class="selector-icon">📊</div>
            <div class="selector-title">Compare Environments</div>
        </div>
        <div class="selector-form">
            <div class="form-group">
                <label for="env1-select">Environment 1 (Base)</label>
                <select id="env1-select" class="env-select">
                    <option value="">Select environment...</option>
                    {{#each availableEnvs}}
                    <option value="{{this}}">{{this}}</option>
                    {{/each}}
                </select>
            </div>
            <div class="form-group">
                <label for="env2-select">Environment 2 (Compare)</label>
                <select id="env2-select" class="env-select">
                    <option value="">Select environment...</option>
                    {{#each availableEnvs}}
                    <option value="{{this}}">{{this}}</option>
                    {{/each}}
                </select>
            </div>
            <button id="run-comparison" class="run-comparison-btn" disabled>🔍 Run Comparison</button>
        </div>
        <div class="selector-hint">
            <span class="hint-icon">ℹ️</span>
            <span>Select two different environments to compare their configurations</span>
        </div>
    </div>
    <div id="comparison-results" class="comparison-results" style="display: none;">
        <!-- Comparison results will be rendered here -->
    </div>
</div>
