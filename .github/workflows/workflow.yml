name: Build & Publish VS Code Extension

on:
  push:
    tags:
      - 'v*.*.*'   # only runs on tag creation

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile TypeScript
        run: pnpm run compile

      - name: Package extension
        run: |
          TAG="${{ github.ref_name }}"
          if [ -z "$TAG" ]; then
            TAG="$(echo "${GITHUB_SHA}" | cut -c1-7)"
          fi
          OUT="chart-profile-visualizer-${TAG}.vsix"
          echo "OUT=${OUT}" >> $GITHUB_ENV
          echo "Packaging VSIX -> ${OUT}"
          pnpm exec vsce package --no-dependencies --ignore-engines --out "${OUT}"
        shell: bash

      - name: Get version from tag
        id: get_version
        run: |
          echo "VSIX_NAME=$(ls *.vsix | head -n 1)" >> $GITHUB_ENV

      - name: Publish to Visual Studio Marketplace
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
        run: pnpm exec vsce publish --packagePath "${VSIX_NAME}" --pat "${VSCE_TOKEN}"

      - name: Upload VSIX artifact and create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.VSIX_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}