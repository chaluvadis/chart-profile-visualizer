name: Build & Release VS Code Extension

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ✅ Use LTS instead of Node 24
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile extension
        run: pnpm compile

      - name: Install vsce
        run: pnpm add -D @vscode/vsce

      - name: Package extension
        id: package
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          OUT="chart-profile-visualizer-${TAG}.vsix"
          echo "VSIX_NAME=${OUT}" >> $GITHUB_ENV
          echo "Packaging VSIX -> ${OUT}"
          pnpm exec vsce package --out "${OUT}"

      - name: Check VSCE token
        shell: bash
        run: |
          if [ -z "${{ secrets.VSCE_TOKEN }}" ]; then
            echo "ERROR: VSCE_TOKEN secret is not set."
            exit 1
          fi

      - name: Publish to Visual Studio Marketplace
        shell: bash
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
          VSIX_NAME: ${{ env.VSIX_NAME }}
        run: |
          echo "Publishing ${VSIX_NAME}"
          pnpm exec vsce publish --packagePath "${VSIX_NAME}" --pat "${VSCE_TOKEN}"

      - name: Create GitHub Release and upload VSIX
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.VSIX_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
