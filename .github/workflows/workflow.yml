name: Publish to Visual Studio Marketplace

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    strategy:
      matrix:
        node-version: [24.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Compile TypeScript
      run: pnpm run compile

    - name: Package extension
      run: |
        # Install vsce globally
        pnpm add -g @vscode/vsce

        # Determine output filename based on tag or SHA
        TAG="${{ github.ref_name }}"
        if [ -z "$TAG" ]; then
          TAG="$(echo "${GITHUB_SHA}" | cut -c1-7)"
        fi
        OUT="chart-profile-visualizer-${TAG}.vsix"
        echo "OUT=${OUT}" >> $GITHUB_ENV
        echo "Packaging VSIX -> ${OUT}"
        npx vsce package --out "${OUT}"

    - name: Get VSIX name
      id: get_version
      run: echo "VSIX_NAME=$(ls *.vsix | head -n 1)" >> $GITHUB_ENV

    - name: Publish to Visual Studio Marketplace
      env:
        VSIX_NAME: ${{ env.VSIX_NAME }}
        VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
      run: |
        # Extract version from tag
        VERSION=${GITHUB_REF#refs/tags/v}

        # Publish to Marketplace
        vsce publish --pat $VSCE_TOKEN --version $VERSION

    - name: Upload VSIX artifact
      uses: actions/upload-artifact@v4
      with:
        name: vscode-extension-${{ github.ref_name }}
        path: '*.vsix'
        retention-days: 30
