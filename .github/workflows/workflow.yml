name: Build & Publish VS Code Extension

on:
  push:
    tags:
      - 'v*.*.*'   # only runs on tag creation

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24  
          
      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile TypeScript
        run: pnpm run compile

      - name: Determine tag
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "TAG=${TAG}" >> $GITHUB_ENV
          echo "Using tag: ${TAG}"

      - name: Package VS Code Extension
        shell: bash
        run: |
          OUT="chart-profile-visualizer-${TAG}.vsix"
          echo "VSIX_NAME=${OUT}" >> $GITHUB_ENV
          echo "Packaging VSIX -> ${OUT}"
          pnpm exec vsce package --out "${OUT}"

      - name: Check VSCE token
        shell: bash
        run: |
          if [ -z "${{ secrets.VSCE_TOKEN }}" ]; then
            echo "ERROR: VSCE_TOKEN secret is not set."
            exit 1
          fi

      - name: Publish to Visual Studio Marketplace
        shell: bash
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
          VSIX_NAME: ${{ env.VSIX_NAME }}
        run: |
          echo "Publishing ${VSIX_NAME} with tag ${TAG}"
          pnpm run package --packagePath "${VSIX_NAME}" --pat "${VSCE_TOKEN}" --version "${TAG#v}"

      - name: Upload VSIX artifact and create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.VSIX_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
