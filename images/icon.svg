<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Background rounded square -->
  <rect width="128" height="128" rx="24" fill="#1E1E2E"/>
  
  <!-- Bar chart bars (representing chart visualization) -->
  <rect x="20" y="68" width="14" height="30" rx="3" fill="#4FC1FF"/>
  <rect x="40" y="50" width="14" height="48" rx="3" fill="#4FC1FF"/>
  <rect x="60" y="34" width="14" height="64" rx="3" fill="#4FC1FF"/>
  
  <!-- Helm wheel (simplified, minimalistic) -->
  <circle cx="96" cy="42" r="18" stroke="#C586C0" stroke-width="3" fill="none"/>
  <circle cx="96" cy="42" r="5.5" fill="#C586C0"/>
  <!-- Wheel spokes -->
  <line x1="96" y1="24" x2="96" y2="33" stroke="#C586C0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="96" y1="51" x2="96" y2="60" stroke="#C586C0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="78" y1="42" x2="87" y2="42" stroke="#C586C0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="105" y1="42" x2="114" y2="42" stroke="#C586C0" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Diagonal spokes -->
  <line x1="83.3" y1="29.3" x2="89.5" y2="35.5" stroke="#C586C0" stroke-width="2" stroke-linecap="round"/>
  <line x1="102.5" y1="48.5" x2="108.7" y2="54.7" stroke="#C586C0" stroke-width="2" stroke-linecap="round"/>
  <line x1="108.7" y1="29.3" x2="102.5" y2="35.5" stroke="#C586C0" stroke-width="2" stroke-linecap="round"/>
  <line x1="89.5" y1="48.5" x2="83.3" y2="54.7" stroke="#C586C0" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Subtle baseline -->
  <line x1="16" y1="102" x2="112" y2="102" stroke="#4FC1FF" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  
  <!-- "HELM" text below the chart -->
  <text x="64" y="118" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="4" fill="#C586C0">HELM</text>
</svg>